name: CI

on:
  pull_request:
    paths:
      - "charts/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-bash-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Lint Bash scripts
        run: find .github -name '*.sh' -type f -print0 | xargs -0 shellcheck

  lint-chart:
    runs-on: ubuntu-latest
    needs: lint-bash-scripts
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f  # v2.8.0
      - name: Run chart-testing (lint)
        run: ct lint --config ct.yaml

  unit-test:
    runs-on: ubuntu-latest
    needs: lint-chart
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --verify=false
      - name: Add Helm repos
        run: |
          helm repo add thanos-community https://thanos-community.github.io/helm-charts
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add rustfs https://charts.rustfs.com/
          helm repo update
      - name: Build chart dependencies
        run: |
          for chart in charts/*/; do
            helm dependency update "$chart"
          done
      - name: Run unit tests
        run: |
          CHART_DIRS="$(git diff --find-renames --name-only "$(git rev-parse --abbrev-ref HEAD)" remotes/origin/master -- charts | grep '[cC]hart.yaml' | sed -e 's#/[Cc]hart.yaml##g')"
          for CHART_DIR in ${CHART_DIRS}; do
            if [ -d "${CHART_DIR}" ]; then
              echo "Running unit tests for ${CHART_DIR}..."
              helm unittest "${CHART_DIR}"
            else
              echo "Skipping ${CHART_DIR} (directory does not exist on current branch)"
            fi
          done

  install-chart:
    name: install-chart
    runs-on: ubuntu-latest
    needs:
      - lint-chart
      - unit-test
    strategy:
      matrix:
        # keep in sync with active Kubernetes releases; use exact patch versions
        # available as kindest/node images on hub.docker.com/r/kindest/node
        k8s:
          - v1.33.7
          - v1.34.3
          - v1.35.1
          # - v1.36.0
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
      - name: Create kind ${{ matrix.k8s }} cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          node_image: kindest/node:${{ matrix.k8s }}
          config: .github/kind-config.yaml
      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f  # v2.8.0
      - name: Add Helm repos and update chart dependencies
        run: |
          helm repo add thanos-community https://thanos-community.github.io/helm-charts
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add rustfs https://charts.rustfs.com/
          helm repo update
          helm dependency update charts/thanos
      - name: Run chart-testing (install)
        run: ct install --config ct.yaml
