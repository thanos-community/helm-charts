name: ci

on:
  pull_request:
    paths:
      - 'charts/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-bash-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint Bash scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.github'

  lint-chart:
    runs-on: ubuntu-latest
    needs: lint-bash-scripts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0
      - name: Run chart-testing (lint)
        run: ct lint --config .github/ct.yaml

  kubeconform-chart:
    runs-on: ubuntu-latest
    needs: lint-chart
    strategy:
      matrix:
        # active Kubernetes releases as of 2026-03 (v1.32 EOL Feb 2026)
        k8s:
          - v1.33.0
          - v1.34.0
          - v1.35.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Add Helm repos
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
      - name: Install kubeconform
        run: |
          curl -sSLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          sudo tar -C /usr/local/bin -xf /tmp/kubeconform.tar.gz kubeconform
      - name: Run kubeconform
        env:
          KUBERNETES_VERSION: ${{ matrix.k8s }}
        run: |
          CHART_DIRS="$(git diff --find-renames --name-only "$(git rev-parse --abbrev-ref HEAD)" remotes/origin/master -- charts | grep '[cC]hart.yaml' | sed -e 's#/[Cc]hart.yaml##g')"
          for CHART_DIR in ${CHART_DIRS}; do
            echo "Validating ${CHART_DIR} against Kubernetes ${KUBERNETES_VERSION}..."
            helm dependency build "${CHART_DIR}"
            helm template "${CHART_DIR}" | kubeconform \
              --strict \
              --ignore-missing-schemas \
              --kubernetes-version "${KUBERNETES_VERSION#v}" \
              --schema-location default \
              --schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
          done

  install-chart:
    name: install-chart
    runs-on: ubuntu-latest
    needs:
      - lint-chart
      - kubeconform-chart
    strategy:
      matrix:
        # keep in sync with kubeconform-chart matrix; use exact patch versions
        # available as kindest/node images on hub.docker.com/r/kindest/node
        k8s:
          - v1.33.4
          - v1.34.2
          - v1.35.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Create kind ${{ matrix.k8s }} cluster
        uses: helm/kind-action@v1.10.0
        with:
          node_image: kindest/node:${{ matrix.k8s }}
          config: .github/kind-config.yaml
      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0
      - name: Run chart-testing (install)
        run: ct install --config .github/ct.yaml
