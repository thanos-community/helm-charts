name: Renovate

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      RENOVATE_REPOSITORIES: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Renovate
        uses: renovatebot/github-action@v46.1.9
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
