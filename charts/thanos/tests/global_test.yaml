suite: global resources

tests:
  # -- ServiceAccount ----------------------------------------------------

  - it: renders serviceaccount when create and rbac are true
    template: serviceaccount.yaml
    set:
      global.serviceAccount.create: true
      global.rbac.create: true
    asserts:
      - isKind:
          of: ServiceAccount

  - it: does not render serviceaccount when create is false
    template: serviceaccount.yaml
    set:
      global.serviceAccount.create: false
      global.rbac.create: true
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render serviceaccount when rbac is false
    template: serviceaccount.yaml
    set:
      global.serviceAccount.create: true
      global.rbac.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: applies serviceaccount annotations
    template: serviceaccount.yaml
    set:
      global.serviceAccount.create: true
      global.rbac.create: true
      global.serviceAccount.annotations:
        custom-annotation: my-value
    asserts:
      - equal:
          path: metadata.annotations.custom-annotation
          value: my-value

  # -- ServiceAccount name resolution (thanos.serviceAccountName) --------
  # Exercises every branch of the helper through the pod spec, plus the
  # ClusterRoleBinding subject which must never resolve to an empty name.

  - it: defaults the pod serviceAccountName to <fullname>-thanos when create is true
    template: bucket/deployment.yaml
    set:
      bucket.enabled: true
      bucket.bucketweb.enabled: true
      global.serviceAccount.create: true
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-thanos-thanos

  - it: uses the name override for the pod serviceAccountName when create is true
    template: bucket/deployment.yaml
    set:
      bucket.enabled: true
      bucket.bucketweb.enabled: true
      global.serviceAccount.create: true
      global.serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: custom-sa

  - it: falls back to the default serviceaccount when create is false and no name is set
    template: bucket/deployment.yaml
    set:
      bucket.enabled: true
      bucket.bucketweb.enabled: true
      global.serviceAccount.create: false
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: default

  - it: uses the name override for the pod serviceAccountName when create is false
    template: bucket/deployment.yaml
    set:
      bucket.enabled: true
      bucket.bucketweb.enabled: true
      global.serviceAccount.create: false
      global.serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: custom-sa

  - it: binds the ruler rule-importer to the resolved serviceaccount name
    template: ruler/rbac.yaml
    documentIndex: 1
    set:
      ruler.enabled: true
      ruler.autoImportPrometheusRules.enabled: true
      global.rbac.create: true
      global.serviceAccount.create: true
    asserts:
      - equal:
          path: subjects[0].name
          value: RELEASE-NAME-thanos-thanos

  - it: binds the ruler rule-importer to the default serviceaccount when create is false
    template: ruler/rbac.yaml
    documentIndex: 1
    set:
      ruler.enabled: true
      ruler.autoImportPrometheusRules.enabled: true
      global.rbac.create: true
      global.serviceAccount.create: false
    asserts:
      - equal:
          path: subjects[0].name
          value: default

  # -- PrometheusRule ----------------------------------------------------

  - it: renders prometheusrule when thanosRules are enabled
    template: prometheusrule/rule.yaml
    set:
      global.thanosRules.enabled: true
    asserts:
      - isKind:
          of: PrometheusRule

  - it: does not render prometheusrule when thanosRules are disabled
    template: prometheusrule/rule.yaml
    set:
      global.thanosRules.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: applies extra labels to prometheusrule
    template: prometheusrule/rule.yaml
    set:
      global.thanosRules.enabled: true
      global.thanosRules.labels:
        custom-label: my-value
    asserts:
      - equal:
          path: metadata.labels.custom-label
          value: my-value

  # -- RustFS init-bucket Job --------------------------------------------

  - it: renders rustfs init-bucket job when enabled
    template: rustfs/init-bucket.yaml
    set:
      rustfs.enabled: true
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: RELEASE-NAME-thanos-init-bucket

  - it: does not render rustfs init-bucket job when disabled
    template: rustfs/init-bucket.yaml
    set:
      rustfs.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: uses existing secret for rustfs credentials when set
    template: rustfs/init-bucket.yaml
    set:
      rustfs.enabled: true
      rustfs.initBucket.existingSecret: my-rustfs-secret
      rustfs.initBucket.existingSecretKeys.accessKey: access-key
      rustfs.initBucket.existingSecretKeys.secretKey: secret-key
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: my-rustfs-secret

  - it: sets bucket name in rustfs init-bucket job
    template: rustfs/init-bucket.yaml
    set:
      rustfs.enabled: true
      rustfs.initBucket.bucketName: my-bucket
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "my-bucket"

  # -- global.podAnnotations ---------------------------------------------
  # Regression coverage for github.com/thanos-community/helm-charts/issues/125
  # The bug: empty ingress.annotations defaults emitted `{}` and broke YAML
  # parsing once global.podAnnotations was merged in. These tests pin down
  # both the resource-metadata and pod-template rendering paths.

  - it: applies global.podAnnotations to resource metadata via thanos.annotations helper
    template: bucket/deployment.yaml
    set:
      bucket.enabled: true
      bucket.bucketweb.enabled: true
      global.podAnnotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    asserts:
      - equal:
          path: metadata.annotations["cluster-autoscaler.kubernetes.io/safe-to-evict"]
          value: "false"

  - it: applies global.podAnnotations to pod template metadata
    template: bucket/deployment.yaml
    set:
      bucket.enabled: true
      bucket.bucketweb.enabled: true
      global.podAnnotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["cluster-autoscaler.kubernetes.io/safe-to-evict"]
          value: "false"

  - it: renders ingress cleanly when global.podAnnotations is set and ingress.annotations is empty
    template: bucket/ingress.yaml
    set:
      bucket.enabled: true
      bucket.bucketweb.enabled: true
      bucket.bucketweb.ingress.enabled: true
      bucket.bucketweb.ingress.hosts:
        - host: thanos.example.com
          paths:
            - path: /
              pathType: Prefix
      global.podAnnotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: metadata.annotations["cluster-autoscaler.kubernetes.io/safe-to-evict"]
          value: "false"

  - it: merges ingress.annotations with global.podAnnotations on the Ingress
    template: bucket/ingress.yaml
    set:
      bucket.enabled: true
      bucket.bucketweb.enabled: true
      bucket.bucketweb.ingress.enabled: true
      bucket.bucketweb.ingress.annotations:
        kubernetes.io/ingress.class: nginx
      bucket.bucketweb.ingress.hosts:
        - host: thanos.example.com
          paths:
            - path: /
              pathType: Prefix
      global.podAnnotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    asserts:
      - equal:
          path: metadata.annotations["kubernetes.io/ingress.class"]
          value: nginx
      - equal:
          path: metadata.annotations["cluster-autoscaler.kubernetes.io/safe-to-evict"]
          value: "false"

  - it: renders pod template annotations cleanly when global.podAnnotations is empty
    template: bucket/deployment.yaml
    set:
      bucket.enabled: true
      bucket.bucketweb.enabled: true
    asserts:
      - notExists:
          path: spec.template.metadata.annotations.placeholder

  # -- global.storageClass behavior tests ---------------------------------

  - it: uses cluster-default storageClass when both global.storageClass and component storageClass are empty for compactor
    template: compactor/statefulset.yaml
    set:
      compactor.enabled: true
      compactor.persistence.enabled: true
      compactor.persistence.storageClass: ""
      global.storageClass: ""
    asserts:
      - notExists:
          path: spec.volumeClaimTemplates[0].spec.storageClassName

  - it: uses global.storageClass for compactor PVC when global is set and component empty
    template: compactor/statefulset.yaml
    set:
      compactor.enabled: true
      compactor.persistence.enabled: true
      global.storageClass: my-global-sc
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: my-global-sc

  - it: uses component storageClass when global.storageClass is empty for compactor
    template: compactor/statefulset.yaml
    set:
      compactor.enabled: true
      compactor.persistence.enabled: true
      compactor.persistence.storageClass: comp-sc
      global.storageClass: ""
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: comp-sc

  - it: component storageClass overrides global for compactor
    template: compactor/statefulset.yaml
    set:
      compactor.enabled: true
      compactor.persistence.enabled: true
      compactor.persistence.storageClass: comp-sc
      global.storageClass: my-global-sc
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: comp-sc

