suite: gateway api routes

tests:
  # -- Query HTTPRoute ------------------------------------------------

  - it: does not render query HTTPRoute when disabled
    template: query/httproute.yaml
    set:
      query.enabled: true
      query.httpRoute.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders query HTTPRoute with correct kind and apiVersion
    template: query/httproute.yaml
    set:
      query.enabled: true
      query.httpRoute.enabled: true
      query.httpRoute.parentRefs:
        - name: my-gateway
          namespace: gateway-system
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-thanos-query

  - it: sets parentRefs on query HTTPRoute
    template: query/httproute.yaml
    set:
      query.enabled: true
      query.httpRoute.enabled: true
      query.httpRoute.parentRefs:
        - name: prod-gateway
          namespace: infra
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: prod-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: infra

  - it: sets hostnames on query HTTPRoute
    template: query/httproute.yaml
    set:
      query.enabled: true
      query.httpRoute.enabled: true
      query.httpRoute.parentRefs:
        - name: my-gateway
      query.httpRoute.hostnames:
        - thanos-query.example.com
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: thanos-query.example.com

  - it: routes to correct service port on query HTTPRoute
    template: query/httproute.yaml
    set:
      query.enabled: true
      query.httpRoute.enabled: true
      query.httpRoute.parentRefs:
        - name: my-gateway
      query.service.httpPort: 9090
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 9090

  # -- Query GRPCRoute ------------------------------------------------

  - it: does not render query GRPCRoute when disabled
    template: query/grpcroute.yaml
    set:
      query.enabled: true
      query.grpcRoute.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders query GRPCRoute with correct kind
    template: query/grpcroute.yaml
    set:
      query.enabled: true
      query.grpcRoute.enabled: true
      query.grpcRoute.parentRefs:
        - name: my-gateway
          namespace: gateway-system
    asserts:
      - isKind:
          of: GRPCRoute
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-thanos-query-grpc

  - it: routes gRPC to correct port
    template: query/grpcroute.yaml
    set:
      query.enabled: true
      query.grpcRoute.enabled: true
      query.grpcRoute.parentRefs:
        - name: my-gateway
      query.service.grpcPort: 10901
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 10901

