suite: ruler component

tests:
  # -- StatefulSet basics ---------------------------------------------

  - it: renders statefulset when ruler is enabled
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: RELEASE-NAME-thanos-ruler

  - it: does not render when ruler is disabled
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: sets the correct replica count
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      ruler.replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: uses the global image repository and tag
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.image.repository: quay.io/thanos/thanos
      global.image.tag: v0.40.0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: quay.io/thanos/thanos:v0.40.0

  - it: passes extra CLI args
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      ruler.extraArgs:
        - --log.level=debug
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--log.level=debug"

  - it: sets alert query URL when configured
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      ruler.alertQueryUrl: http://query.example.com
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --alert.query-url=http://query.example.com

  - it: creates persistence volume claim template
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      ruler.persistence.enabled: true
      ruler.persistence.size: 10Gi
    asserts:
      - isNotEmpty:
          path: spec.volumeClaimTemplates
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 10Gi

  - it: uses emptyDir when persistence is disabled
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      ruler.persistence.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  # -- Annotations and labels -----------------------------------------

  - it: applies component annotations
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      ruler.annotations:
        custom-annotation: my-value
    asserts:
      - equal:
          path: metadata.annotations.custom-annotation
          value: my-value

  - it: applies component labels
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      ruler.labels:
        team: alerting
    asserts:
      - equal:
          path: metadata.labels.team
          value: alerting

  # -- Extra env vars -------------------------------------------------

  - it: injects component extraEnv
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      ruler.extraEnv:
        - name: LOG_FORMAT
          value: json
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LOG_FORMAT
            value: json

  - it: merges global and component extraEnv with component winning
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.extraEnv:
        - name: LOG_FORMAT
          value: json
        - name: SHARED_VAR
          value: global-value
      ruler.extraEnv:
        - name: SHARED_VAR
          value: component-value
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LOG_FORMAT
            value: json
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SHARED_VAR
            value: component-value

  # -- Extra envFrom vars -----------------------------------------------

  - it: merges global and component extraEnvFrom with component winning
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.extraEnvFrom:
        - name: GLOBAL_FROM
          value: global-value
        - name: SHARED_FROM
          value: global-value
      ruler.extraEnvFrom:
        - name: SHARED_FROM
          value: component-value
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            name: GLOBAL_FROM
            value: global-value
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            name: SHARED_FROM
            value: component-value

  # -- Security contexts ----------------------------------------------

  - it: applies global container security context
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.containerSecurityContext:
        readOnlyRootFilesystem: true
        runAsNonRoot: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true

  - it: applies component container security context overriding global
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.containerSecurityContext:
        runAsNonRoot: true
      ruler.containerSecurityContext:
        runAsNonRoot: false
        runAsUser: 1001
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1001

  - it: applies pod security context
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      ruler.podSecurityContext:
        fsGroup: 1001
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1001

  # -- Scheduling and placement ---------------------------------------

  - it: applies component affinity overriding global
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - ap-southeast-2a
      ruler.affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/instance: thanos
                topologyKey: kubernetes.io/hostname
    asserts:
      - isNotEmpty:
          path: spec.template.spec.affinity.podAntiAffinity
      - isNull:
          path: spec.template.spec.affinity.nodeAffinity

  - it: applies global affinity as fallback
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - ap-southeast-2a
    asserts:
      - isNotEmpty:
          path: spec.template.spec.affinity.nodeAffinity

  - it: applies component nodeSelector overriding global
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.nodeSelector:
        node-role: node
      ruler.nodeSelector:
        node-role: thanos
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.node-role
          value: thanos

  - it: applies global nodeSelector as fallback
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.nodeSelector:
        node-role: thanos
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.node-role
          value: thanos

  - it: applies component tolerations
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      ruler.tolerations:
        - key: dedicated
          operator: Equal
          value: thanos
          effect: NoSchedule
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: dedicated
            operator: Equal
            value: thanos
            effect: NoSchedule

  - it: applies global tolerations as fallback
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.tolerations:
        - key: dedicated
          operator: Equal
          value: thanos
          effect: NoSchedule
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: dedicated
            operator: Equal
            value: thanos
            effect: NoSchedule

  - it: applies component topologySpreadConstraints overriding global
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: thanos
      ruler.topologySpreadConstraints:
        - maxSkew: 2
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: thanos
    asserts:
      - contains:
          path: spec.template.spec.topologySpreadConstraints
          content:
            maxSkew: 2
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app: thanos

  - it: applies global topologySpreadConstraints as fallback
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: thanos
    asserts:
      - contains:
          path: spec.template.spec.topologySpreadConstraints
          content:
            maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                app: thanos

  - it: applies component priorityClassName overriding global
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.priorityClassName: high-priority
      ruler.priorityClassName: critical
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: critical

  - it: applies global priorityClassName as fallback
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.priorityClassName: high-priority
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: high-priority

  # -- Extra init and sidecar containers ------------------------------

  - it: merges global and component extraInitContainers
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.extraInitContainers:
        - name: global-init
          image: busybox:latest
          command: ["echo", "global"]
      ruler.extraInitContainers:
        - name: component-init
          image: busybox:latest
          command: ["echo", "component"]
    asserts:
      - contains:
          path: spec.template.spec.initContainers
          content:
            name: global-init
            image: busybox:latest
            command: ["echo", "global"]
      - contains:
          path: spec.template.spec.initContainers
          content:
            name: component-init
            image: busybox:latest
            command: ["echo", "component"]

  - it: merges global and component extraContainers
    template: ruler/statefulset.yaml
    set:
      ruler.enabled: true
      global.extraContainers:
        - name: global-init
          image: busybox:latest
          command: ["echo", "global"]
      ruler.extraContainers:
        - name: component-init
          image: busybox:latest
          command: ["echo", "component"]
    asserts:
      - contains:
          path: spec.template.spec.containers
          content:
            name: global-init
            image: busybox:latest
            command: ["echo", "global"]
      - contains:
          path: spec.template.spec.containers
          content:
            name: component-init
            image: busybox:latest
            command: ["echo", "component"]

  # -- PodDisruptionBudget --------------------------------------------

  - it: renders PDB when component pdb is enabled
    template: ruler/pdb.yaml
    set:
      ruler.enabled: true
      ruler.pdb.enabled: true
      ruler.pdb.maxUnavailable: "1"
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.maxUnavailable
          value: 1

  - it: renders PDB via global pdb.enabled fallback
    template: ruler/pdb.yaml
    set:
      ruler.enabled: true
      global.pdb.enabled: true
      global.pdb.minAvailable: "1"
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.minAvailable
          value: 1

  - it: component PDB values override global
    template: ruler/pdb.yaml
    set:
      ruler.enabled: true
      global.pdb.enabled: true
      global.pdb.minAvailable: "1"
      ruler.pdb.minAvailable: "3"
    asserts:
      - equal:
          path: spec.minAvailable
          value: 3

  - it: does not render PDB when both component and global pdb are disabled
    template: ruler/pdb.yaml
    set:
      ruler.enabled: true
      ruler.pdb.enabled: false
      global.pdb.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # -- Ingress -----------------------------------------------------------

  - it: renders ingress when enabled
    template: ruler/ingress.yaml
    set:
      ruler.enabled: true
      ruler.ingress.enabled: true
      ruler.ingress.hosts:
        - host: thanos.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: metadata.name
          value: RELEASE-NAME-thanos-ruler

  - it: does not render ingress when disabled
    template: ruler/ingress.yaml
    set:
      ruler.enabled: true
      ruler.ingress.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: sets ingress class name
    template: ruler/ingress.yaml
    set:
      ruler.enabled: true
      ruler.ingress.enabled: true
      ruler.ingress.className: nginx
      ruler.ingress.hosts:
        - host: thanos.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: sets ingress host and path
    template: query/ingress.yaml
    set:
      query.enabled: true
      query.ingress.enabled: true
      query.ingress.hosts:
        - host: thanos.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].host
          value: thanos.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /

  # -- ServiceMonitor ----------------------------------------------------

  - it: renders servicemonitor when component enabled
    template: ruler/servicemonitor.yaml
    set:
      ruler.enabled: true
      ruler.serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.name
          value: RELEASE-NAME-thanos-ruler

  - it: renders servicemonitor via global fallback
    template: ruler/servicemonitor.yaml
    set:
      ruler.enabled: true
      global.serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor

  - it: does not render servicemonitor when disabled
    template: ruler/servicemonitor.yaml
    set:
      ruler.enabled: true
      ruler.serviceMonitor.enabled: false
      global.serviceMonitor.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # -- ConfigMap rules ---------------------------------------------------

  - it: renders rules configmap when ruler is enabled
    template: ruler/configmaprules.yaml
    set:
      ruler.enabled: true
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-thanos-ruler-rules

  - it: does not render rules configmap when ruler is disabled
    template: ruler/configmaprules.yaml
    set:
      ruler.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # -- ConfigMap alertmanagers -------------------------------------------

  - it: renders alertmanagers configmap when ruler is enabled
    template: ruler/configmap-alertmanagers.yaml
    set:
      ruler.enabled: true
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-thanos-ruler-am

  - it: does not render alertmanagers configmap when ruler is disabled
    template: ruler/configmap-alertmanagers.yaml
    set:
      ruler.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders alertmanagers configmap data as a valid alert.AlertingConfig with default values
    template: ruler/configmap-alertmanagers.yaml
    set:
      ruler.enabled: true
    asserts:
      - equal:
          path: data["alertmanagers.yaml"]
          value: |
            alertmanagers:
              - static_configs:
                  - alertmanager-operated.monitoring.svc.cluster.local:9093
                scheme: http
                api_version: v2

  - it: renders alertmanagers configmap with user-provided config
    template: ruler/configmap-alertmanagers.yaml
    set:
      ruler.enabled: true
      ruler.alertmanagers.config: |
        alertmanagers:
          - static_configs:
              - custom-alertmanager.example.com:9093
            scheme: https
            api_version: v2
    asserts:
      - equal:
          path: data["alertmanagers.yaml"]
          value: |
            alertmanagers:
              - static_configs:
                  - custom-alertmanager.example.com:9093
                scheme: https
                api_version: v2

  - it: renders alertmanagers configmap with templated values via tpl
    template: ruler/configmap-alertmanagers.yaml
    set:
      ruler.enabled: true
      ruler.alertmanagers.config: |
        alertmanagers:
          - static_configs:
              - {{ .Release.Name }}-am:9093
            scheme: http
            api_version: v2
    asserts:
      - equal:
          path: data["alertmanagers.yaml"]
          value: |
            alertmanagers:
              - static_configs:
                  - RELEASE-NAME-am:9093
                scheme: http
                api_version: v2

  # -- ConfigMap query ---------------------------------------------------

  - it: renders query configmap when ruler is enabled
    template: ruler/configmap-query.yaml
    set:
      ruler.enabled: true
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-thanos-ruler-query

  - it: does not render query configmap when ruler is disabled
    template: ruler/configmap-query.yaml
    set:
      ruler.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # -- ConfigMap auto-import prometheus rules -----------------------------

  - it: renders rule-importer configmap when autoImport is enabled
    template: ruler/configmap-auto-import-prometheus-rules.yaml
    set:
      ruler.enabled: true
      ruler.autoImportPrometheusRules.enabled: true
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-thanos-ruler-rule-importer

  - it: does not render rule-importer configmap when autoImport is disabled
    template: ruler/configmap-auto-import-prometheus-rules.yaml
    set:
      ruler.enabled: true
      ruler.autoImportPrometheusRules.enabled: false
    asserts:
      - hasDocuments:
          count: 0
