{{- if and .Values.global.rbac.create (and .Values.ruler.autoImportPrometheusRules.enabled .Values.ruler.autoImportPrometheusRules.rbac.create) -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "thanos.compName" (list . "ruler") }}
  labels:
    {{- include "thanos.labels" . | nindent 4 }}
    {{- with .Values.ruler.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "thanos.annotations" (dict "Values" .Values "component" "ruler") | nindent 4 }}
    {{- with .Values.ruler.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "thanos.compName" (list . "ruler") }}
subjects:
- kind: ServiceAccount
  name: {{ include "thanos.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end -}}
