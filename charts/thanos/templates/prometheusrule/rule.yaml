{{- /*
  Built-in Thanos alerting rules. Sourced from the upstream
  monitoring-mixin and grouped per Thanos component. Each rule group
  lives in its own helper file under templates/prometheusrule/ so this
  file stays a thin assembly layer:

    1. resolve a single context dict via thanos.rules.context
    2. emit the PrometheusRule envelope
    3. include each per-group helper conditionally
*/ -}}
{{- if and .Values.global .Values.global.thanosRules .Values.global.thanosRules.enabled }}
{{- $tr := .Values.global.thanosRules }}
{{- $ctx := include "thanos.rules.context" . | fromYaml }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "thanos.fullname" . }}-rules
  labels:
    app.kubernetes.io/name: thanos
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: thanos
    {{- with $tr.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $tr.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- $rulesYaml := printf "groups:\n%s%s%s%s%s%s%s%s"
    (include "thanos.rules.compact"         $ctx)
    (include "thanos.rules.query"           $ctx)
    (include "thanos.rules.receive"         $ctx)
    (include "thanos.rules.sidecar"         $ctx)
    (include "thanos.rules.store"           $ctx)
    (include "thanos.rules.rule"            $ctx)
    (include "thanos.rules.bucketReplicate" $ctx)
    (include "thanos.rules.componentAbsent" $ctx)
  }}
  {{- $parsedRules := $rulesYaml | fromYaml }}
  groups:
  {{- range $parsedRules.groups }}
  {{- $group := . }}
  {{- $filteredRules := list }}
  {{- range $group.rules }}
  {{- $disabledAlerts := $tr.disabledAlerts | default list }}
  {{- if not (has .alert $disabledAlerts) }}
  {{- $rule := . }}
  {{- if and $tr.alertOverrides (hasKey $tr.alertOverrides .alert) }}
  {{- $overrides := index $tr.alertOverrides .alert }}
  {{- $mergedLabels := merge (deepCopy $overrides) $rule.labels }}
  {{- $rule = merge (dict "labels" $mergedLabels) $rule }}
  {{- end }}
  {{- $filteredRules = append $filteredRules $rule }}
  {{- end }}
  {{- end }}
  {{- if $filteredRules }}
  - {{ merge (dict "rules" $filteredRules) (omit $group "rules") | toYaml | nindent 4 | trim }}
  {{- end }}
  {{- end }}
{{- end }}
