{{- if and .Values.receive.enabled (eq (include "thanos.receive.isSplit" .) "true") }}
{{- $http := .Values.receive.router.ingress.http }}
{{- $remoteWrite := .Values.receive.router.ingress.remoteWrite }}
{{- $ingresses := dict "http" $http "remote-write" $remoteWrite }}
{{- $sep := "" }}
{{- range $port, $ingress := $ingresses }}
{{- if and $ingress $ingress.enabled }}
{{ $sep -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    {{- with $ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- include "thanos.annotations" (dict "Values" $.Values "component" "router" "parent" "receive") | nindent 4 }}
  labels:
    {{- include "thanos.labels" $ | nindent 4 }}
    app.kubernetes.io/component: receive-router
  name: {{ include "thanos.compName" (list $ (printf "receive-router%s" (eq $port "http" | ternary "" (printf "-%s" $port)))) }}
spec:
  {{- with $ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    {{- range $ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
        {{- range .paths }}
          - backend:
              service:
                name: {{ include "thanos.receive.routerName" $ }}
                port:
                  name: {{ $port }}
            path: {{ .path | quote }}
            pathType: {{ .pathType | default "Prefix" }}
        {{- end }}
    {{- end }}
  {{- with $ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- $sep = "---\n" }}
{{- end }}
{{- end }}
{{- end }}
