{{- if and .Values.global.serviceAccount.create .Values.global.rbac.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "thanos.serviceAccountName" . }}
  labels:
    {{- include "thanos.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.global.serviceAccount.annotations | nindent 4 }}
{{- end }}
