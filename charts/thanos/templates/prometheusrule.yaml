{{- if and .Values.global .Values.global.thanosRules .Values.global.thanosRules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "thanos.fullname" . }}-rules
  labels:
    app.kubernetes.io/name: thanos
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: thanos
    {{- with .Values.global.thanosRules.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "thanos.annotations" (dict "Values" .Values "component" "thanos-rules") | nindent 4 }}
spec:
  groups:
    - name: thanos.availability
      rules:
        - alert: ThanosComponentDown
          expr: |
            sum by (job) (up{namespace="{{ .Release.Namespace }}", job=~".*thanos.*"}) == 0
          for: {{ default "5m" .Values.global.thanosRules.forDefaults.componentDown }}
          labels:
            severity: {{ default "critical" .Values.global.thanosRules.severity.componentDown }}
          annotations:
            summary: A Thanos component has no healthy targets
            description: Job {{`{{ $labels.job }}`}} has no scraped targets in namespace {{ .Release.Namespace }}.

    - name: thanos.compactor
      rules:
        - alert: ThanosCompactorHalted
          expr: thanos_compact_halted{namespace="{{ .Release.Namespace }}"} == 1
          for: {{ default "2m" .Values.global.thanosRules.forDefaults.default }}
          labels:
            severity: {{ default "critical" .Values.global.thanosRules.severity.critical }}
          annotations:
            summary: Thanos compactor halted
            description: Compactor reports halted state. Check object store access and recent logs.

        - alert: ThanosBucketOperationFailures
          expr: |
            rate(thanos_objstore_bucket_operation_failures_total{namespace="{{ .Release.Namespace }}"}[5m]) > {{ default 0 .Values.global.thanosRules.thresholds.bucketOperationFailures }}
          for: {{ default "1m" .Values.global.thanosRules.forDefaults.short }}
          labels:
            severity: {{ default "warning" .Values.global.thanosRules.severity.warning }}
          annotations:
            summary: Thanos object store operations failing
            description: Elevated bucket operation failures detected.

        - alert: ThanosCompactMultipleRunning
          expr: sum by (job) (up{job=~".*compactor.*"}) > 1
          for: 5m
          labels:
            severity: info
          annotations:
            description: No more than one Thanos Compact instance should be running at once. There are {{$value}} instances running.
            summary: Thanos Compact has multiple instances running.

        - alert: ThanosCompactHighCompactionFailures
          expr: |
            (
              sum by (job) (rate(thanos_compact_group_compactions_failures_total{job=~".*compactor.*"}[5m]))
            /
              sum by (job) (rate(thanos_compact_group_compactions_total{job=~".*compactor.*"}[5m]))
            * 100 > 5
            )
          for: 15m
          labels:
            severity: info
          annotations:
            description: Thanos Compact {{$labels.job}} is failing to execute {{$value | humanize}}% of compactions.
            summary: Thanos Compact is failing to execute compactions.

        - alert: ThanosCompactBucketHighOperationFailures
          annotations:
            description: Thanos Compact {{$labels.job}} Bucket is failing to execute {{$value | humanize}}% of operations.
            summary: Thanos Compact Bucket is having a high number of operation failures.
          expr: |
            (
              sum by (job) (rate(thanos_objstore_bucket_operation_failures_total{job=~".*compactor.*"}[5m]))
            /
              sum by (job) (rate(thanos_objstore_bucket_operations_total{job=~".*compactor.*"}[5m]))
            * 100 > 5
            )
          for: 15m
          labels:
            severity: info

        - alert: ThanosCompactHasNotRun
          annotations:
            description: Thanos Compact {{$labels.job}} has not uploaded anything for 24
              hours.
            summary: Thanos Compact has not uploaded anything for last 24 hours.
          expr: (time() - max by (job) (max_over_time(thanos_objstore_bucket_last_successful_upload_time{job=~".*compactor.*"}[24h])))
            / 60 / 60 > 24
          labels:
            severity: info

        - alert: ThanosCompactIsDown
          annotations:
            description: ThanosCompact has disappeared. Prometheus target for the component
              cannot be discovered.
            summary: Thanos component has disappeared.
          expr: |
            absent(up{job=~".*compactor.*"} == 1)
          for: 15m
          labels:
            severity: {{ default "warning" .Values.global.thanosRules.severity.warning }}

    - name: thanos.storegateway
      rules:
        - alert: ThanosBlockSyncFailures
          expr: |
            rate(thanos_blocks_meta_sync_failures_total{namespace="{{ .Release.Namespace }}"}[5m]) > {{ default 0 .Values.global.thanosRules.thresholds.blockSyncFailures }}
          for: {{ default "1m" .Values.global.thanosRules.forDefaults.short }}
          labels:
            severity: {{ default "warning" .Values.global.thanosRules.severity.warning }}
          annotations:
            summary: Thanos Store Gateway block sync failures
            description: Store Gateway is failing to sync block metadata.

        - alert: ThanosStoreGrpcErrorRate
          expr: |
            (
              sum by (job) (rate(grpc_server_handled_total{grpc_code=~"Unknown|Internal|Unavailable|DataLoss|DeadlineExceeded", job=~".*store.*"}[5m]))
            /
              sum by (job) (rate(grpc_server_started_total{job=~".*store.*"}[5m]))
            * 100 > 5
            )
          for: 5m
          labels:
            severity: info
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosstoregrpcerrorrate
          annotations:
            description: Thanos Store {{$labels.job}} is failing to handle {{$value | humanize}}%
              of requests.
            summary: Thanos Store is failing to handle gRPC requests.

        - alert: ThanosStoreSeriesGateLatencyHigh
          expr: |
            (
              histogram_quantile(0.99, sum by (job, le) (rate(thanos_bucket_store_series_gate_queries_duration_seconds_bucket{job=~".*store.*"}[5m]))) > 2
            and
              sum by (job) (rate(thanos_bucket_store_series_gate_queries_duration_seconds_count{job=~".*store.*"}[5m])) > 0
            )
          for: 10m
          labels:
            severity: info
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosstoreseriesgatelatencyhigh
            annotations:
            description: Thanos Store {{$labels.job}} has a 99th percentile latency of {{$value}}
              seconds for store series gate requests.
            summary: Thanos Store has high latency for store series gate requests.

        - alert: ThanosStoreBucketHighOperationFailures
          expr: |
            (
              sum by (job) (rate(thanos_objstore_bucket_operation_failures_total{job=~".*store.*"}[5m]))
            /
              sum by (job) (rate(thanos_objstore_bucket_operations_total{job=~".*store.*"}[5m]))
            * 100 > 5
            )
          for: 15m
          labels:
            severity: info
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosstorebuckethighoperationfailures
          annotations:
            description: Thanos Store {{$labels.job}} Bucket is failing to execute {{$value | humanize}}% of operations.
            summary: Thanos Store Bucket is failing to execute operations.

        - alert: ThanosStoreObjstoreOperationLatencyHigh
          expr: |
            (
              histogram_quantile(0.99, sum by (job, le) (rate(thanos_objstore_bucket_operation_duration_seconds_bucket{job=~".*store.*"}[5m]))) > 2
            and
              sum by (job) (rate(thanos_objstore_bucket_operation_duration_seconds_count{job=~".*store.*"}[5m])) > 0
            )
          for: 10m
          labels:
            severity: info
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosstoreobjstoreoperationlatencyhigh
          annotations:
            description: Thanos Store {{$labels.job}} Bucket has a 99th percentile latency
              of {{$value}} seconds for the bucket operations.
            summary: Thanos Store is having high latency for bucket operations.

        - alert: ThanosStoreIsDown
          expr: |
            absent(up{job=~".*store.*"} == 1)
          for: 5m
          labels:
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosstoreisdown
          annotations:
            description: ThanosStore has disappeared. Prometheus target for the component
              cannot be discovered.
            summary: Thanos component has disappeared.

    - name: thanos.query
      rules:
        - alert: ThanosQueryHighErrorRate
          expr: |
            sum by (job) (rate(http_requests_total{namespace="{{ .Release.Namespace }}", job=~".*thanos.*query.*", code=~"5.."}[5m])) > {{ default 0 .Values.global.thanosRules.thresholds.query5xxRate }}
          for: {{ default "1m" .Values.global.thanosRules.forDefaults.short }}
          labels:
            severity: {{ default "warning" .Values.global.thanosRules.severity.warning }}
          annotations:
            summary: Thanos Query high 5xx rate
            description: Elevated 5xx responses on Query.

        - alert: ThanosQueryHttpRequestQueryErrorRateHigh
          expr: |
            (
              sum by (job) (rate(http_requests_total{code=~"5..", job=~".*query.*", handler="query"}[5m]))
            /
              sum by (job) (rate(http_requests_total{job=~".*query.*", handler="query"}[5m]))
            ) * 100 > 5
          for: 5m
          labels:
            no_alert_on_absence: "true" # thanos query does not initialize http_requests_total on start
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosqueryhttprequestqueryerrorratehigh
          annotations:
            description: Thanos Query {{$labels.job}} is failing to handle {{$value | humanize}}%
              of "query" requests.
            summary: Thanos Query is failing to handle requests.

        - alert: ThanosQueryHttpRequestQueryRangeErrorRateHigh
          expr: |
            (
              sum by (job) (rate(http_requests_total{code=~"5..", job=~".*query.*", handler="query_range"}[5m]))
            /
              sum by (job) (rate(http_requests_total{job=~".*query.*", handler="query_range"}[5m]))
            ) * 100 > 5
          for: 5m
          labels:
            no_alert_on_absence: "true" # thanos query does not initialize http_requests_total on start
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosqueryhttprequestqueryrangeerrorratehigh
          annotations:
            description: Thanos Query {{$labels.job}} is failing to handle {{$value | humanize}}%
              of "query_range" requests.
            summary: Thanos Query is failing to handle requests.

        - alert: ThanosQueryGrpcServerErrorRate
          expr: |
            (
              sum by (job) (rate(grpc_server_handled_total{grpc_code=~"Unknown|ResourceExhausted|Internal|Unavailable|DataLoss|DeadlineExceeded", job=~".*query.*"}[5m]))
            /
              sum by (job) (rate(grpc_server_started_total{job=~".*query.*"}[5m]))
            * 100 > 5
            )
          for: 5m
          labels:
            severity: info
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosquerygrpcservererrorrate
          annotations:
            description: Thanos Query {{$labels.job}} is failing to handle {{$value | humanize}}%
              of requests.
            summary: Thanos Query is failing to handle requests.

        - alert: ThanosQueryGrpcClientErrorRate
          expr: |
            (
              sum by (job) (rate(grpc_client_handled_total{grpc_code!="OK", job=~".*query.*"}[5m]))
            /
              sum by (job) (rate(grpc_client_started_total{job=~".*query.*"}[5m]))
            ) * 100 > 5
          for: 5m
          labels:
            severity: info
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosquerygrpcclienterrorrate
          annotations:
            description: Thanos Query {{$labels.job}} is failing to send {{$value | humanize}}%
              of requests.
            summary: Thanos Query is failing to send requests.

        - alert: ThanosQueryHighDNSFailures
          expr: |
            (
              sum by (job) (rate(thanos_query_endpoints_dns_failures_total{job=~".*query.*"}[5m]))
            /
              sum by (job) (rate(thanos_query_endpoints_dns_lookups_total{job=~".*query.*"}[5m]))
            ) * 100 > 1
          for: 15m
          labels:
            severity: info
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosqueryhighdnsfailures
          annotations:
            description: Thanos Query {{$labels.job}} have {{$value | humanize}}% of failing
              DNS queries for store endpoints.
            summary: Thanos Query is having high number of DNS failures.

        - alert: ThanosQueryInstantLatencyHigh
          expr: |
            (
              histogram_quantile(0.99, sum by (job, le) (rate(http_request_duration_seconds_bucket{job=~".*query.*", handler="query"}[5m]))) > 40
            and
              sum by (job) (rate(http_request_duration_seconds_bucket{job=~".*query.*", handler="query"}[5m])) > 0
            )
          for: 10m
          labels:
            no_alert_on_absence: "true" # thanos query does not initialize http_request_duration_seconds_bucket on start
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosqueryinstantlatencyhigh
          annotations:
            description: Thanos Query {{$labels.job}} has a 99th percentile latency of {{$value}}
              seconds for instant queries.
            summary: Thanos Query has high latency for queries.

        - alert: ThanosQueryRangeLatencyHigh
          expr: |
            (
              histogram_quantile(0.99, sum by (job, le) (rate(http_request_duration_seconds_bucket{job=~".*query.*", handler="query_range"}[5m]))) > 90
            and
              sum by (job) (rate(http_request_duration_seconds_count{job=~".*query.*", handler="query_range"}[5m])) > 0
            )
          for: 10m
          labels:
            no_alert_on_absence: "true" # thanos query does not initialize http_request_duration_seconds_count on start
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosqueryrangelatencyhigh
          annotations:
            description: Thanos Query {{$labels.job}} has a 99th percentile latency of {{$value}}
              seconds for range queries.
            summary: Thanos Query has high latency for queries.

        - alert: ThanosQueryOverload
          expr: |
            (
              max_over_time(thanos_query_concurrent_gate_queries_max[5m]) - avg_over_time(thanos_query_concurrent_gate_queries_in_flight[5m]) < 1
            )
          for: 15m
          labels:
            severity: info
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosqueryoverload
          annotations:
            description: Thanos Query {{$labels.job}} has been overloaded for more than
              15 minutes. This may be a symptom of excessive simultaneous complex requests,
              low performance of the Prometheus API, or failures within these components.
              Assess the health of the Thanos query instances, the connected Prometheus
              instances, look for potential senders of these requests and then contact support.
            summary: Thanos query reaches its maximum capacity serving concurrent requests.

        - alert: ThanosQueryIsDown
          expr: |
            absent(up{job=~".*query.*"} == 1)
          for: 10m
          labels:
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosqueryisdown
          annotations:
            description: ThanosQuery has disappeared. Prometheus target for the component
              cannot be discovered.
            summary: Thanos component has disappeared.

    - name: thanos.ruler
      rules:
        - alert: ThanosRuleEvaluationFailures
          expr: |
            rate(thanos_rule_evaluation_failures_total{namespace="{{ .Release.Namespace }}"}[5m]) > {{ default 0 .Values.global.thanosRules.thresholds.ruleEvalFailures }}
          for: {{ default "1m" .Values.global.thanosRules.forDefaults.short }}
          labels:
            severity: {{ default "warning" .Values.global.thanosRules.severity.warning }}
          annotations:
            summary: Thanos Ruler evaluation failures
            description: Rules are failing to evaluate. Check Ruler and Query connectivity.

        - alert: ThanosRuleQueueIsDroppingAlerts
          expr: |
            sum by (job, instance) (rate(thanos_alert_queue_alerts_dropped_total{job=~".*ruler.*"}[5m])) > 0
          for: 5m
          labels:
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosrulequeueisdroppingalerts
          annotations:
            description: Thanos Rule {{$labels.instance}} is failing to queue alerts.
            summary: Thanos Rule is failing to queue alerts.

        - alert: ThanosRuleSenderIsFailingAlerts
          expr: |
            sum by (job, instance) (rate(thanos_alert_sender_alerts_dropped_total{job=~".*ruler.*"}[5m])) > 0
          for: 5m
          labels:
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosrulesenderisfailingalerts
          annotations:
            description: Thanos Rule {{$labels.instance}} is failing to send alerts to alertmanager.
            summary: Thanos Rule is failing to send alerts to alertmanager.

        - alert: ThanosRuleHighRuleEvaluationFailures
          expr: |
            (
              sum by (job, instance) (rate(prometheus_rule_evaluation_failures_total{job=~".*ruler.*"}[5m]))
            /
              sum by (job, instance) (rate(prometheus_rule_evaluations_total{job=~".*ruler.*"}[5m]))
            * 100 > 5
            )
          for: 5m
          labels:
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosrulehighruleevaluationfailures
          annotations:
            description: Thanos Rule {{$labels.instance}} is failing to evaluate rules.
            summary: Thanos Rule is failing to evaluate rules.

        - alert: ThanosRuleHighRuleEvaluationWarnings
          expr: |
            sum by (job, instance) (rate(thanos_rule_evaluation_with_warnings_total{job=~".*ruler.*"}[5m])) > 0
          for: 15m
          labels:
            severity: info
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosrulehighruleevaluationwarnings
          annotations:
            description: Thanos Rule {{$labels.instance}} has high number of evaluation
              warnings.
            summary: Thanos Rule has high number of evaluation warnings.

        - alert: ThanosRuleRuleEvaluationLatencyHigh
          expr: |
            (
              sum by (job, instance, rule_group) (prometheus_rule_group_last_duration_seconds{job=~".*ruler.*"})
            >
              sum by (job, instance, rule_group) (prometheus_rule_group_interval_seconds{job=~".*ruler.*"})
            )
          for: 5m
          labels:
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosruleruleevaluationlatencyhigh
          annotations:
            description: Thanos Rule {{$labels.instance}} has higher evaluation latency
              than interval for {{$labels.rule_group}}.
            summary: Thanos Rule has high rule evaluation latency.

        - alert: ThanosRuleGrpcErrorRate
          expr: |
            (
              sum by (job, instance) (rate(grpc_server_handled_total{grpc_code=~"Unknown|ResourceExhausted|Internal|Unavailable|DataLoss|DeadlineExceeded", job=~".*ruler.*"}[5m]))
            /
              sum by (job, instance) (rate(grpc_server_started_total{job=~".*ruler.*"}[5m]))
            * 100 > 5
            )
          for: 5m
          labels:
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosrulegrpcerrorrate
          annotations:
            description: Thanos Rule {{$labels.job}} is failing to handle {{$value | humanize}}%
              of requests.
            summary: Thanos Rule is failing to handle grpc requests.

        - alert: ThanosRuleConfigReloadFailure
          expr: avg by (job, instance) (thanos_rule_config_last_reload_successful{job=~".*ruler.*"})
            != 1
          for: 5m
          labels:
            severity: info
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosruleconfigreloadfailure
          annotations:
            description: Thanos Rule {{$labels.job}} has not been able to reload its configuration.
            summary: Thanos Rule has not been able to reload configuration.

        - alert: ThanosRuleQueryHighDNSFailures
          expr: |
            (
              sum by (job, instance) (rate(thanos_rule_query_apis_dns_failures_total{job=~".*ruler.*"}[5m]))
            /
              sum by (job, instance) (rate(thanos_rule_query_apis_dns_lookups_total{job=~".*ruler.*"}[5m]))
            * 100 > 1
            )
          for: 15m
          labels:
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosrulequeryhighdnsfailures
          annotations:
            description: Thanos Rule {{$labels.job}} has {{$value | humanize}}% of failing
              DNS queries for query endpoints.
            summary: Thanos Rule is having high number of DNS failures.

        - alert: ThanosRuleAlertmanagerHighDNSFailures
          expr: |
            (
              sum by (job, instance) (rate(thanos_rule_alertmanagers_dns_failures_total{job=~".*ruler.*"}[5m]))
            /
              sum by (job, instance) (rate(thanos_rule_alertmanagers_dns_lookups_total{job=~".*ruler.*"}[5m]))
            * 100 > 1
            )
          for: 15m
          labels:
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosrulealertmanagerhighdnsfailures
          annotations:
            description: Thanos Rule {{$labels.instance}} has {{$value | humanize}}% of
              failing DNS queries for Alertmanager endpoints.
            summary: Thanos Rule is having high number of DNS failures.

        - alert: ThanosRuleNoEvaluationFor10Intervals
          expr: |
            time() -  max by (job, instance, group) (prometheus_rule_group_last_evaluation_timestamp_seconds{job=~".*ruler.*"})
            >
            10 * max by (job, instance, group) (prometheus_rule_group_interval_seconds{job=~".*ruler.*"})
          for: 5m
          labels:
            severity: info
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosrulenoevaluationfor10intervals
          annotations:
            description: Thanos Rule {{$labels.job}} has rule groups that did not evaluate
              for at least 10x of their expected interval.
            summary: Thanos Rule has rule groups that did not evaluate for 10 intervals.

        - alert: ThanosNoRuleEvaluations
          expr: |
            sum by (job, instance) (rate(prometheus_rule_evaluations_total{job=~".*ruler.*"}[5m])) <= 0
              and
            sum by (job, instance) (thanos_rule_loaded_rules{job=~".*ruler.*"}) > 0
          for: 5m
          labels:
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosnoruleevaluations
          annotations:
            description: Thanos Rule {{$labels.instance}} did not perform any rule evaluations
              in the past 10 minutes.
            summary: Thanos Rule did not perform any rule evaluations.

        - alert: ThanosRuleIsDown
          expr: |
            absent(up{job=~".*ruler.*"} == 1)
          for: 10m
          labels:
            severity: warning
            playbook: https://github.com/thanos-io/thanos/tree/main/mixin/runbook.md#alert-name-thanosruleisdown
          annotations:
            description: ThanosRule has disappeared. Prometheus target for the component
              cannot be discovered.
            summary: Thanos component has disappeared.

    - name: thanos.receive
      rules:
        - alert: ThanosReceiveRequestErrors
          expr: |
            sum by (job) (rate(http_requests_total{namespace="{{ .Release.Namespace }}", job=~".*thanos.*receive.*", code=~"5.."}[5m])) > {{ default 0 .Values.global.thanosRules.thresholds.receive5xxRate }}
          for: {{ default "1m" .Values.global.thanosRules.forDefaults.short }}
          labels:
            severity: {{ default "warning" .Values.global.thanosRules.severity.warning }}
          annotations:
            summary: Thanos Receive high 5xx rate
            description: Elevated 5xx on Receive. Check hashrings and GRPC links between replicas.
{{- end }}
