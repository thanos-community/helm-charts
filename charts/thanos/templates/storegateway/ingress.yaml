{{- if .Values.storegateway.enabled }}
{{- $http := .Values.storegateway.ingress.http.enabled | ternary .Values.storegateway.ingress.http .Values.storegateway.ingress }}
{{- $ingresses := dict "http" $http "grpc" .Values.storegateway.ingress.grpc }}
{{- $sep := "" }}
{{- range $port, $ingress := $ingresses }}
{{- if $ingress.enabled }}
{{ $sep -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    {{- toYaml $ingress.annotations | nindent 4 }}
    {{- include "thanos.annotations" (dict "Values" $.Values "component" "storegateway") | nindent 4 }}
  labels:
    {{- include "thanos.labels" $ | nindent 4 }}
  name: {{ include "thanos.compName" (list $ (printf "storegateway%s" (eq $port "http" | ternary "" (printf "-%s" $port)))) }}
spec:
  {{- with $ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    {{- range $ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
        {{- range .paths }}
          - backend:
              service:
                name: {{ include "thanos.compName" (list $ "storegateway") }}
                port:
                  name: {{ $port }}
            path: {{ .path | quote }}
            pathType: {{ .pathType | default "Prefix" }}
        {{- end }}
    {{- end }}
  {{- with $ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- $sep = "---\n" }}
{{- end }}
{{- end }}
{{- end }}
