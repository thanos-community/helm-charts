{{- if .Values.storegateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "thanos.compName" (list . "storegateway") }}
  labels:
    app.kubernetes.io/component: storegateway
    {{- include "thanos.labels" . | nindent 4 }}
    {{- with .Values.storegateway.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "thanos.annotations" (dict "Values" .Values "component" "storegateway") | nindent 4 }}
    {{- with .Values.storegateway.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.storegateway.service.type }}
  {{- if eq (include "thanos.storegateway.sharded" .) "true" }}
  # Headless so that the Query DNS-SRV discovery (dnssrv+_grpc._tcp) resolves
  # every shard pod individually and fans out across all shards.
  clusterIP: None
  {{- end }}
  ports:
    - name: http
      port: {{ .Values.storegateway.service.httpPort }}
      targetPort: http
    - name: grpc
      port: {{ .Values.storegateway.service.grpcPort }}
      targetPort: grpc
  selector:
    app.kubernetes.io/component: storegateway
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- if eq (include "thanos.storegateway.sharded" .) "true" }}
{{- $shards := (include "thanos.storegateway.shards" . | fromYaml).shards }}
{{- range $shard := $shards }}
---
# Per-shard HTTP Service for addressing an individual shard (UI, /metrics,
# debug endpoints). gRPC fan-out for Query is handled by the aggregate headless
# Service above. This Service intentionally omits the
# `app.kubernetes.io/component: storegateway` metadata label so the shared
# ServiceMonitor selects only the aggregate Service and does not scrape every
# pod twice.
apiVersion: v1
kind: Service
metadata:
  name: {{ $shard.name }}
  labels:
    {{- include "thanos.labels" $ | nindent 4 }}
    thanos.io/storegateway-shard: {{ $shard.index | quote }}
    {{- with $.Values.storegateway.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "thanos.annotations" (dict "Values" $.Values "component" "storegateway") | nindent 4 }}
    {{- with $.Values.storegateway.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ $.Values.storegateway.service.type }}
  ports:
    - name: http
      port: {{ $.Values.storegateway.service.httpPort }}
      targetPort: http
  selector:
    app.kubernetes.io/component: storegateway
    app.kubernetes.io/instance: {{ $.Release.Name }}
    thanos.io/storegateway-shard: {{ $shard.index | quote }}
{{- end }}
{{- end }}
{{- end }}
