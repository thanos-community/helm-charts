    # -- Deprecated. Use `storegateway.ingress.http.enabled` instead.
    enabled: false
    # -- Deprecated. Use `storegateway.ingress.http.className` instead.
    className: ""
    # -- Deprecated. Use `storegateway.ingress.http.annotations` instead.
    # @default -- {}
    annotations: {}
    # Deprecated. Use `storegateway.ingress.http.hosts` instead.
