# ======================================================================
# Store Gateway component — serves historical blocks from the object store over the Store API.
storegateway:
  # -- Enable the Store Gateway StatefulSet.
  enabled: true

  # -- Number of Store Gateway pod replicas. Two or more is recommended for HA.
  replicaCount: 2

  # Kubernetes Service configuration for the Store Gateway.
