    # -- Kubernetes Service type for the Store Gateway.
    type: ClusterIP
    # -- gRPC Store API port exposed by the Store Gateway Service.
    grpcPort: 10901
    # -- HTTP port exposed by the Store Gateway Service.
    httpPort: 10902
    # -- Extra annotations for the Store Gateway Service.
    # @default -- {}
    annotations: {}
    # -- Extra labels for the Store Gateway Service.
    # @default -- {}
