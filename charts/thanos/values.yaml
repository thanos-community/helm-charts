# ======================================================================
# Thanos umbrella chart values
# Comprehensive and self-documented.
# Top-level sections map 1-to-1 to Thanos components.
# Settings under `global` propagate to every component unless the
# component provides its own override for that key.
# ======================================================================

# ======================================================================
# Global settings
# Applied as sensible defaults to all components.
# Each component can override with its own section if needed.
# ======================================================================
# Global defaults applied to every Thanos component. Individual components can override any of these.
global:
  # Container image used for all Thanos components.
  image:
    # -- Docker repository for all Thanos containers by default.
    repository: quay.io/thanos/thanos
    # -- Container image tag. Changing this upgrades all components at once.
    tag: v0.41.0
    # -- Image pull policy applied to every container. One of Always, IfNotPresent, Never.
    pullPolicy: IfNotPresent

  # -- List of imagePullSecrets applied to every pod by default.
  # @default -- []
  imagePullSecrets: []

  # -- Extra labels merged into every Kubernetes resource created by this chart.
  # @default -- {}
  commonLabels: {}

  # -- Cluster DNS domain, used when constructing in-cluster endpoints.
  clusterDomain: "cluster.local"

  # -- Annotations added to every pod by default. Component-level annotations are merged on top.
  # @default -- {}
  podAnnotations: {}

  # -- Pod-level security context applied to every pod. Component-level values override this.
  # @default -- {}
  podSecurityContext: {}

  # Container-level security context applied to every main container. Component-level values override this.
  containerSecurityContext:
    # -- Prevent privilege escalation inside the container.
    allowPrivilegeEscalation: false
    # -- Mount the root filesystem as read-only.
    readOnlyRootFilesystem: true
    # Linux capabilities configuration for all containers.
    capabilities:
      # Drop all Linux capabilities from the container.
      drop:
        - ALL
    # -- Require the container to run as a non-root user.
    runAsNonRoot: true

  # -- DNS configuration applied to every pod. Component-level values override this.
  # @default -- {}
  dnsConfig: {}
  # Example:
  # dnsConfig:
  #   options:
  #     - name: ndots
  #       value: "1"

  # -- Additional volumes available to every pod by default.
  # @default -- []
  extraVolumes: []

  # -- Additional volume mounts added to every main container by default.
  # @default -- []
  extraVolumeMounts: []

  # -- Default resource requests and limits. Override per component as needed.
  # @default -- {}
  resources: {}

  # -- Node selector applied to every pod by default.
  # @default -- {}
  nodeSelector: {}

  # -- Toleration rules applied to every pod by default.
  # @default -- []
  tolerations: []

  # -- Affinity rules applied to every pod by default.
  # @default -- {}
  affinity: {}

  # -- Topology spread constraints applied to every pod by default.
  # @default -- []
  topologySpreadConstraints: []

  # -- Priority class name applied to every pod by default.
  priorityClassName: ""

  # -- Extra environment variables injected into every main container by default.
  # @default -- []
  extraEnv: []

  # -- Extra environment variable sources (ConfigMap, Secret) for every main container.
  # @default -- []
  extraEnvFrom: []

  # -- Extra init containers added to every pod by default.
  # @default -- []
  extraInitContainers: []

  # -- Extra sidecar containers added to every pod by default.
  # @default -- []
  extraContainers: []

  # -- Create a NetworkPolicy for every enabled component. When true each
  # component gets a NetworkPolicy that allows ingress on its service ports
  # from within the namespace and permits all egress.
  networkPolicies: false

  # Object store configuration shared by all components that read or write
  # blocks (Receive, Store Gateway, Compactor, Ruler).
  # Object store configuration block shared by all Thanos components.
  objstore:
    # -- When true, the chart creates a Kubernetes Secret named `secretName`
    # containing the inline `config` below. Set to false when the Secret is
    # managed externally (Vault, External Secrets Operator, kubectl, etc.).
    createSecret: false

    # -- Name of the Kubernetes Secret that carries the object store config.
    # All components mount this Secret as a file.
    secretName: thanos-objstore

    # -- Key inside the Secret whose value is the object store YAML.
    secretKey: objstore.yml

    # -- Inline object store configuration rendered into the Secret when
    # `createSecret` is true. Processed via `tpl`, so Helm template syntax
    # (e.g. `{{ .Release.Name }}`) is valid inside the string.
    # Refer to https://thanos.io/tip/thanos/storage.md/ for the full schema.
    config: |
      type: GCS
      config:
        bucket: change-me
        endpoint: storage.googleapis.com
        region: eu-west-1
        insecure: false

      # Example for S3
      # type: S3
      # config:
      #   bucket: my-s3-bucket
      #   endpoint: s3.eu-west-1.amazonaws.com
      #   region: eu-west-1
      #   access_key: myaccess
      #   secret_key: mysecret

  # RBAC and ServiceAccount defaults.
  # RBAC configuration applied globally across all components.
  rbac:
    # -- Create RBAC resources (ClusterRole, ClusterRoleBinding) required by
    # components that need cluster-level access (e.g. Ruler auto-import).
    create: true

  # ServiceAccount configuration applied to every component by default.
  serviceAccount:
    # -- Create a dedicated ServiceAccount for each component.
    create: true
    # -- Extra annotations merged into every ServiceAccount.
    # @default -- {}
    annotations: {}
    # -- Name override for all ServiceAccounts. Empty means auto-generate
    # per-component names based on the release name.
    name: ""

  # Built-in Thanos alerting rules deployed as PrometheusRule CRDs.
  # Requires the Prometheus Operator to be installed in the cluster.
  # Configuration for built-in Thanos PrometheusRule alerting resources.
  thanosRules:
    # -- Deploy PrometheusRule resources with built-in Thanos alerting rules.
    enabled: true
    # -- Extra labels merged into every PrometheusRule resource.
    # @default -- {}
    labels: {}
    # Alert firing thresholds. Raise these above 0 to reduce noise in busy clusters.
    thresholds:
      # -- Alert threshold for bucket operation error rate (errors per second).
      bucketOperationFailures: 0
      # -- Alert threshold for block synchronisation failure rate.
      blockSyncFailures: 0
      # -- Alert threshold for Query 5xx response rate.
      query5xxRate: 0
      # -- Alert threshold for Ruler evaluation failure rate.
      ruleEvalFailures: 0
      # -- Alert threshold for Receive 5xx response rate.
      receive5xxRate: 0
    # Default `for` durations used across alert rules.
    forDefaults:
      # -- `for` duration used when a component is completely down.
      componentDown: 5m
      # -- Default `for` duration for most alert rules.
      default: 2m
      # -- Short `for` duration used for fast-burn alerts.
      short: 1m
    # Severity label values injected into PrometheusRule alert rules.
    severity:
      # -- Severity label value used for critical alerts.
      critical: critical
      # -- Severity label value used for warning alerts.
      warning: warning
      # -- Severity label value used for component-down alerts.
      componentDown: critical

  # ServiceMonitor defaults for Prometheus Operator scraping.
  # Components inherit these defaults and can override per-component.
  # Default ServiceMonitor configuration inherited by all components.
  serviceMonitor:
    # -- Enable a Prometheus Operator ServiceMonitor for every component.
    # Individual components can override this with their own serviceMonitor.enabled.
    enabled: false
    # -- Namespace where ServiceMonitor resources are created.
    # Empty means the same namespace as the release.
    namespace: ""
    # -- Extra labels merged into every ServiceMonitor resource.
    # @default -- {}
    labels: {}
    # -- Extra annotations merged into every ServiceMonitor resource.
    # @default -- {}
    annotations: {}
    # -- Scrape interval. Empty string uses the Prometheus operator default.
    interval: ""
    # -- Scrape timeout. Empty string uses the Prometheus operator default.
    scrapeTimeout: ""
    # -- Scrape scheme: http or https.
    scheme: ""
    # -- TLS configuration for scraping when scheme is https.
    # @default -- {}
    tlsConfig: {}
    # -- Relabeling rules applied to scraped metrics before ingestion.
    # @default -- []
    relabelings: []
    # -- Metric relabeling rules applied after ingestion.
    # @default -- []
    metricRelabelings: []

  # PodDisruptionBudget defaults. Components inherit these and can override per-component.
  # Default PodDisruptionBudget configuration inherited by all components.
  pdb:
    # -- Enable a PodDisruptionBudget for every component. Individual
    # components can override this with their own pdb.enabled.
    enabled: false
    # -- (int or string) Minimum number of available pods during a disruption.
    # Cannot be set at the same time as maxUnavailable.
    minAvailable: ""
    # -- (int or string) Maximum number of unavailable pods during a disruption.
    # Cannot be set at the same time as minAvailable.
    maxUnavailable: ""

# ======================================================================
# Bucket component
# Read-only web UI for inspecting object store blocks.
# Often disabled in production; useful for debugging compaction issues.
# ======================================================================
# Bucket component group. Contains the Bucketweb UI sub-chart.
bucket:
  # -- Enable the bucket group. Must be true for the objstore Secret to be
  # created when global.objstore.createSecret is true.
  enabled: true

  # Bucketweb deployment — read-only browser for object store blocks.
  bucketweb:
    # -- Enable the Bucketweb deployment (read-only object store browser).
    enabled: false

    # -- Number of Bucketweb pod replicas.
    replicaCount: 1

    # Kubernetes Service configuration for Bucketweb.
    service:
      # -- Kubernetes Service type for Bucketweb.
      type: ClusterIP
      # -- HTTP port exposed by the Bucketweb Service.
      port: 10902
      # -- Extra annotations for the Bucketweb Service.
      # @default -- {}
      annotations: {}
      # -- Extra labels for the Bucketweb Service.
      # @default -- {}
      labels: {}

    # Kubernetes Ingress configuration for Bucketweb.
    ingress:
      # -- Enable a Kubernetes Ingress for Bucketweb.
      enabled: false
      # -- Ingress class name (e.g. nginx, traefik).
      className: ""
      # -- Extra annotations for the Ingress resource.
      # @default -- {}
      annotations: {}
      # List of host rules for the Ingress.
      hosts:
        - host: bucketweb.local
          paths:
            - path: /
              pathType: Prefix
      # -- TLS configuration for the Ingress.
      # @default -- []
      tls: []
      # Example:
      # tls:
      #   - secretName: bucketweb-tls
      #     hosts:
      #       - bucketweb.local

    # Gateway API HTTPRoute configuration for Bucketweb.
    httpRoute:
      # -- Enable a Gateway API HTTPRoute for Bucketweb (alternative to Ingress).
      enabled: false
      # -- Annotations for the HTTPRoute resource.
      # @default -- {}
      annotations: {}
      # -- Gateway parentRefs the HTTPRoute should attach to.
      # @default -- []
      parentRefs: []
      # Example:
      # parentRefs:
      #   - name: my-gateway
      #     namespace: gateway-system
      #     sectionName: https
      # -- Hostnames to match. Empty matches all hostnames on the parent Gateway.
      # @default -- []
      hostnames: []
      # Example:
      # hostnames:
      #   - bucketweb.example.com

    # HorizontalPodAutoscaler configuration for Bucketweb.
    autoscaling:
      # -- Enable HorizontalPodAutoscaler for Bucketweb.
      enabled: false
      # -- Minimum number of Bucketweb replicas.
      minReplicas: 1
      # -- Maximum number of Bucketweb replicas.
      maxReplicas: 3
      # -- Target CPU utilisation percentage for Bucketweb autoscaling.
      targetCPUUtilizationPercentage: 80
      # -- Target memory utilisation percentage. Null disables memory-based scaling.
      targetMemoryUtilizationPercentage: null

    # -- Additional CLI arguments appended to the bucketweb command.
    # @default -- []
    extraArgs: []

    # -- Resource requests and limits for the Bucketweb container.
    # @default -- {}
    resources: {}

    # -- Pod security context for Bucketweb. Overrides global.podSecurityContext.
    # @default -- {}
    podSecurityContext: {}

    # -- Container security context for Bucketweb. Overrides global.containerSecurityContext.
    # @default -- {}
    containerSecurityContext: {}

    # -- DNS configuration for Bucketweb pods. Overrides global.dnsConfig.
    # @default -- {}
    dnsConfig: {}

    # -- Extra environment variables injected into the Bucketweb container.
    # @default -- []
    extraEnv: []

    # -- Extra environment variable sources for the Bucketweb container.
    # @default -- []
    extraEnvFrom: []

    # -- Extra init containers for Bucketweb pods.
    # @default -- []
    extraInitContainers: []

    # -- Extra sidecar containers for Bucketweb pods.
    # @default -- []
    extraContainers: []

    # Health and readiness probe configuration for Bucketweb.
    probes:
      # Readiness probe for Bucketweb.
      readiness:
        # -- Enable the readiness probe for Bucketweb.
        enabled: true
        # -- HTTP path checked by the readiness probe.
        path: /-/ready
        # -- Seconds to wait before starting the readiness probe.
        initialDelaySeconds: 5
        # -- How often (seconds) to run the readiness probe.
        periodSeconds: 10
        # -- Seconds after which the probe times out.
        timeoutSeconds: 5
        # -- Consecutive failures before the pod is marked not-ready.
        failureThreshold: 6
        # -- Consecutive successes before the pod is marked ready.
        successThreshold: 1
      # Liveness probe for Bucketweb.
      liveness:
        # -- Enable the liveness probe for Bucketweb.
        enabled: true
        # -- HTTP path checked by the liveness probe.
        path: /-/healthy
        # -- Seconds to wait before starting the liveness probe.
        initialDelaySeconds: 30
        # -- How often (seconds) to run the liveness probe.
        periodSeconds: 10
        # -- Seconds after which the probe times out.
        timeoutSeconds: 5
        # -- Consecutive failures before the container is restarted.
        failureThreshold: 6
        # -- Consecutive successes before the container is considered live.
        successThreshold: 1
      # Startup probe for Bucketweb.
      startup:
        # -- Enable the startup probe for Bucketweb.
        enabled: true
        # -- HTTP path checked by the startup probe.
        path: /-/ready
        # -- Seconds to wait before starting the startup probe.
        initialDelaySeconds: 0
        # -- How often (seconds) to run the startup probe.
        periodSeconds: 5
        # -- Seconds after which the probe times out.
        timeoutSeconds: 5
        # -- Consecutive failures allowed during startup before the container is killed.
        failureThreshold: 60
        # -- Consecutive successes required before the startup probe is considered passed.
        successThreshold: 1

    # -- Storage configuration for Bucketweb. Bucketweb is stateless; leave empty.
    # @default -- {}
    persistence: {}

    # -- Node selector for Bucketweb pod scheduling.
    # @default -- {}
    nodeSelector: {}

    # -- Tolerations for Bucketweb pod scheduling.
    # @default -- []
    tolerations: []

    # -- Affinity rules for Bucketweb pod scheduling.
    # @default -- {}
    affinity: {}

    # -- Topology spread constraints for Bucketweb pods.
    # @default -- []
    topologySpreadConstraints: []

    # -- Priority class name for Bucketweb pods.
    priorityClassName: ""

    # -- Extra annotations applied to Bucketweb resources.
    # @default -- {}
    annotations: {}

    # -- Extra labels applied to Bucketweb resources.
    # @default -- {}
    labels: {}

    # -- Extra volumes for Bucketweb pods.
    # @default -- []
    extraVolumes: []

    # -- Extra volume mounts for the Bucketweb container.
    # @default -- []
    extraVolumeMounts: []

    # Prometheus Operator ServiceMonitor configuration for Bucketweb.
    serviceMonitor:
      # -- Enable a Prometheus Operator ServiceMonitor for Bucketweb.
      enabled: false
      # -- Extra labels for the Bucketweb ServiceMonitor.
      # @default -- {}
      labels: {}
      # -- Extra annotations for the Bucketweb ServiceMonitor.
      # @default -- {}
      annotations: {}
      # -- Scrape interval for Bucketweb. Empty uses the Prometheus operator default.
      interval: ""
      # -- Scrape timeout for Bucketweb. Empty uses the Prometheus operator default.
      scrapeTimeout: ""
      # -- Scrape scheme for Bucketweb (http or https).
      scheme: ""
      # -- TLS configuration for Bucketweb scraping.
      # @default -- {}
      tlsConfig: {}
      # -- Relabeling rules applied before Bucketweb metrics are ingested.
      # @default -- []
      relabelings: []
      # -- Metric relabeling rules applied after Bucketweb metrics are ingested.
      # @default -- []
      metricRelabelings: []

    # PodDisruptionBudget configuration for Bucketweb.
    pdb:
      # -- Enable a PodDisruptionBudget for Bucketweb.
      enabled: false
      # -- (int or string) Minimum available Bucketweb pods during a disruption.
      minAvailable: ""
      # -- (int or string) Maximum unavailable Bucketweb pods during a disruption.
      maxUnavailable: ""

# ======================================================================
# Compactor component
# Compacts, downsamples and deduplicates blocks in the object store.
# Must run as a singleton — do not set replicaCount above 1.
# ======================================================================
# Compactor component — compacts and downsamples blocks. Must run as a singleton.
compactor:
  # -- Enable the Compactor StatefulSet.
  enabled: true

  # -- Number of Compactor replicas. Must remain 1 — running multiple
  # compactors against the same bucket causes data corruption.
  replicaCount: 1

  # PersistentVolumeClaim configuration for the Compactor working directory.
  persistence:
    # -- Enable a PersistentVolumeClaim for the Compactor working directory.
    enabled: true
    # -- Storage capacity for the Compactor PVC (used as a scratch space during compaction).
    size: 10Gi
    # -- StorageClass name for the Compactor PVC. Empty uses the cluster default.
    storageClass: ""
    # Access modes for the Compactor PVC.
    accessModes:
      - ReadWriteOnce

  # Kubernetes Service configuration for the Compactor HTTP endpoint.
  service:
    # -- Kubernetes Service type for the Compactor HTTP endpoint.
    type: ClusterIP
    # -- HTTP port exposed by the Compactor Service.
    port: 10902
    # -- Extra annotations for the Compactor Service.
    # @default -- {}
    annotations: {}
    # -- Extra labels for the Compactor Service.
    # @default -- {}
    labels: {}

  # Kubernetes Ingress configuration for the Compactor.
  ingress:
    # -- Enable a Kubernetes Ingress for the Compactor HTTP endpoint.
    enabled: false
    # -- Ingress class name for the Compactor (e.g. nginx, traefik).
    className: ""
    # Host rules for the Compactor Ingress.
    hosts:
      - host: compactor.local
        paths:
          - path: /
            pathType: Prefix
    # -- TLS configuration for the Compactor Ingress.
    # @default -- []
    tls: []

  # Gateway API HTTPRoute configuration for the Compactor.
  httpRoute:
    # -- Enable a Gateway API HTTPRoute for the Compactor HTTP endpoint.
    enabled: false
    # -- Annotations for the Compactor HTTPRoute resource.
    # @default -- {}
    annotations: {}
    # -- Gateway parentRefs for the Compactor HTTPRoute.
    # @default -- []
    parentRefs: []
    # -- Hostnames to match on the Compactor HTTPRoute.
    # @default -- []
    hostnames: []

  # VerticalPodAutoscaler configuration for the Compactor.
  vpa:
    # -- Enable a VerticalPodAutoscaler for the Compactor.
    enabled: true
    # -- Kubernetes workload kind targeted by the Compactor VPA.
    targetKind: StatefulSet
    # -- VPA update mode for the Compactor. One of Auto, Off, or Initial.
    updateMode: Auto
    # Minimum resource limits enforced by the Compactor VPA.
    minAllowed:
      # -- Minimum CPU resource enforced by the Compactor VPA.
      cpu: 500m
      # -- Minimum memory resource enforced by the Compactor VPA.
      memory: 512Mi
    # Maximum resource limits enforced by the Compactor VPA.
    maxAllowed:
      # -- Maximum CPU resource enforced by the Compactor VPA.
      cpu: 4
      # -- Maximum memory resource enforced by the Compactor VPA.
      memory: 8Gi

  # Additional CLI arguments appended to the `thanos compact` command.
  # Use this to configure retention, consistency delay, and wait mode.
  extraArgs:
    - --log.level=info
    - --log.format=logfmt
    - --retention.resolution-raw=30d
    - --retention.resolution-5m=90d
    - --retention.resolution-1h=365d
    - --consistency-delay=30m
    - --wait

  # -- Resource requests and limits for the Compactor container.
  # @default -- {}
  resources: {}

  # Pod security context for the Compactor. Overrides global.podSecurityContext.
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

  # -- Container security context for the Compactor. Overrides global.containerSecurityContext.
  # @default -- {}
  containerSecurityContext: {}

  # -- DNS configuration for Compactor pods. Overrides global.dnsConfig.
  # @default -- {}
  dnsConfig: {}

  # -- Extra environment variables injected into the Compactor container.
  # @default -- []
  extraEnv: []

  # -- Extra environment variable sources for the Compactor container.
  # @default -- []
  extraEnvFrom: []

  # -- Extra init containers for the Compactor pod.
  # @default -- []
  extraInitContainers: []

  # -- Extra sidecar containers for the Compactor pod.
  # @default -- []
  extraContainers: []

  # Health and readiness probe configuration for the Compactor.
  probes:
    # Readiness probe for the Compactor.
    readiness:
      # -- Enable the readiness probe for the Compactor.
      enabled: true
      # -- HTTP path checked by the Compactor readiness probe.
      path: /-/ready
      # -- Seconds to wait before starting the Compactor readiness probe.
      initialDelaySeconds: 5
      # -- How often (seconds) to run the Compactor readiness probe.
      periodSeconds: 10
      # -- Seconds after which the Compactor readiness probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures before the Compactor pod is marked not-ready.
      failureThreshold: 6
      # -- Consecutive successes before the Compactor pod is marked ready.
      successThreshold: 1
    # Liveness probe for the Compactor.
    liveness:
      # -- Enable the liveness probe for the Compactor.
      enabled: true
      # -- HTTP path checked by the Compactor liveness probe.
      path: /-/healthy
      # -- Seconds to wait before starting the Compactor liveness probe.
      initialDelaySeconds: 30
      # -- How often (seconds) to run the Compactor liveness probe.
      periodSeconds: 10
      # -- Seconds after which the Compactor liveness probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures before the Compactor container is restarted.
      failureThreshold: 6
      # -- Consecutive successes before the Compactor container is considered live.
      successThreshold: 1
    # Startup probe for the Compactor.
    startup:
      # -- Enable the startup probe for the Compactor.
      enabled: true
      # -- HTTP path checked by the Compactor startup probe.
      path: /-/ready
      # -- Seconds to wait before starting the Compactor startup probe.
      initialDelaySeconds: 0
      # -- How often (seconds) to run the Compactor startup probe.
      periodSeconds: 5
      # -- Seconds after which the Compactor startup probe times out.
      timeoutSeconds: 5
      # -- Consecutive failures during Compactor startup before the container is killed.
      failureThreshold: 60
      # -- Consecutive successes before the Compactor startup probe is considered passed.
      successThreshold: 1

  # -- Node selector for Compactor pod scheduling.
  # @default -- {}
  nodeSelector: {}

  # -- Tolerations for Compactor pod scheduling.
  # @default -- []
  tolerations: []

  # -- Affinity rules for Compactor pod scheduling.
  # @default -- {}
  affinity: {}

  # -- Topology spread constraints for Compactor pods.
  # @default -- []
  topologySpreadConstraints: []

  # -- Priority class name for Compactor pods.
  priorityClassName: ""

  # -- Extra annotations applied to Compactor resources.
  # @default -- {}
  annotations: {}

  # -- Extra labels applied to Compactor resources.
  # @default -- {}
  labels: {}

  # -- Extra volumes for Compactor pods.
  # @default -- []
  extraVolumes: []

  # -- Extra volume mounts for the Compactor container.
  # @default -- []
  extraVolumeMounts: []

  # Prometheus Operator ServiceMonitor configuration for the Compactor.
  serviceMonitor:
    # -- Enable a Prometheus Operator ServiceMonitor for the Compactor.
    enabled: false
    # -- Extra labels for the Compactor ServiceMonitor.
    # @default -- {}
    labels: {}
    # -- Extra annotations for the Compactor ServiceMonitor.
    # @default -- {}
    annotations: {}
    # -- Scrape interval for the Compactor. Empty uses the Prometheus operator default.
    interval: ""
    # -- Scrape timeout for the Compactor. Empty uses the Prometheus operator default.
    scrapeTimeout: ""
    # -- Scrape scheme for the Compactor (http or https).
    scheme: ""
    # -- TLS configuration for Compactor scraping.
    # @default -- {}
    tlsConfig: {}
    # -- Relabeling rules applied before Compactor metrics are ingested.
    # @default -- []
    relabelings: []
    # -- Metric relabeling rules applied after Compactor metrics are ingested.
    # @default -- []
    metricRelabelings: []

  # PodDisruptionBudget configuration for the Compactor.
  pdb:
    # -- Enable a PodDisruptionBudget for the Compactor.
    enabled: false
    # -- (int or string) Minimum available Compactor pods during a disruption.
    minAvailable: ""
    # -- (int or string) Maximum unavailable Compactor pods during a disruption.
    maxUnavailable: ""

# ======================================================================
# Query component
# Fan-out query engine that queries multiple Store API endpoints
# and deduplicates results. This is the Prometheus-compatible entrypoint.
# ======================================================================
# Query component — fan-out PromQL engine that deduplicates results across stores.
query:
  # -- Enable the Query Deployment.
  enabled: true

  # -- Number of Query pod replicas. Two or more is recommended for HA.
  replicaCount: 2

  # Kubernetes Service configuration for the Query component.
  service:
    # -- Kubernetes Service type for the Query component.
    type: ClusterIP
    # -- HTTP/PromQL port exposed by the Query Service.
    httpPort: 9090
    # -- gRPC Store API port exposed by the Query Service.
    grpcPort: 10901
    # -- Extra annotations for the Query Service.
    # @default -- {}
    annotations: {}
    # -- Extra labels for the Query Service.
    # @default -- {}
    labels: {}

  # Kubernetes Ingress configuration for the Query endpoint.
  ingress:
    # -- Deprecated. Use `query.ingress.http.enabled` instead.
    enabled: false
    # -- Deprecated. Use `query.ingress.http.className` instead.
    className: ""
    # -- Deprecated. Use `query.ingress.http.annotations` instead.
    # @default -- {}
    annotations: {}
    # Deprecated. Use `query.ingress.http.hosts` instead.
    hosts:
      - host: thanos-query.local
        paths:
          - path: /
            pathType: Prefix
    # -- Deprecated. Use `query.ingress.http.tls` instead.
    # @default -- []
    tls: []

    # If this is enabled, none of the deprecated values above will be used.
    http:
      # -- Enable a Kubernetes Ingress for the Query HTTP endpoint.
      enabled: false
      # -- Ingress class name for Query HTTP endpoint (e.g. nginx, traefik).
      className: ""
      # -- Extra annotations for the Query HTTP Ingress.
      # @default -- {}
      annotations: {}
      # Host rules for the Query HTTP Ingress.
      hosts:
        - host: thanos-query.local
          paths:
            - path: /
              pathType: Prefix
      # -- TLS configuration for the Query HTTP Ingress.
      # @default -- []
      tls: []

    grpc:
