# consider helm install to be failed after 10 minutes
helm-extra-args: --timeout 600s
check-version-increment: true
target-branch: master
debug: true
chart-dirs:
  - charts
chart-repos:
  - thanos-community=https://thanos-community.github.io/helm-charts
  - prometheus-community=https://prometheus-community.github.io/helm-charts
  - rustfs=https://charts.rustfs.com/
chart-yaml-schema: .github/chart_schema.yaml
lint-conf: .github/lintconf.yaml
